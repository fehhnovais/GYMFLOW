services:
  nginx:
    image: nginx:alpine
    container_name: gymflow-nginx-proxy
    restart: always
    ports:
      - "80:80"
    # ✨ ADICIONE ESTAS DUAS LINHAS AQUI EMBAIXO:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-network
    depends_on:
      - app

  app:
    build: .
    container_name: gymflow-app
    restart: always
    env_file:
      - .env
    networks:
      - proxy-network  # 🌐 Fala com o Nginx
      - db-network     # 🗄️ Fala com o Banco e Redis
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: gymflow-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    networks:
      - db-network
    # 👇 Adicione essas linhas exatamente aqui embaixo mantendo o alinhamento:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: gymflow-cache
    restart: always
    networks:
      - db-network     # 🔒 Isolado também

volumes:
  postgres_data:

# 📁 Definição das duas redes separadas
networks:
  proxy-network:
    driver: bridge
  db-network:
    driver: bridge